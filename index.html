// Password gate — simple hash so plaintext isn't in source
var PH='a]k9Rm';function hs(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h}
var HASH=hs('ppfdhurryup');
function unlock(){
  var v=document.getElementById('pw').value;
  if(hs(v)===HASH){
    document.getElementById('lock').style.display='none';
    document.getElementById('mainapp').style.display='';
    sessionStorage.setItem('jp26',1);
    initApp();
  }else{
    document.getElementById('pwerr').textContent='Wrong password';
    document.getElementById('pw').value='';
  }
}
if(sessionStorage.getItem('jp26')==='1'){
  document.getElementById('lock').style.display='none';
  document.getElementById('mainapp').style.display='';
}

      if(m.addr&&m.lat&&m.lng){var al=day.city==='kyoto'?gmk(m.name):gm(m.name,m.lat,m.lng);h+='<div class="maddr">📍 <a href="'+al+'" target="_blank" rel="noopener">'+m.addr+'</a></div>';}

// ── Maps ─────────────────────────────────────────────────
var mapLayers={};
var mapFilter={tokyo:null,kyoto:null};

function poiColor(p){
  if(p.t==='hotel')return '#1a1a2e';
  if(p.t==='sakura')return '#e91e63';
  if(p.t==='pm')return '#d35400';
  if(p.t==='rest')return CC[p.s];
  return '#999';
}
function poiLabel(p){return p.t==='hotel'?'Hotel':p.t==='rest'?'Restaurant':p.t==='pm'?'Afternoon':p.t==='night'?'Nightlife':p.t==='sakura'?'Cherry Blossoms':''}

function initMap(id,pois,center,zoom){
  var el=document.getElementById('map-'+id);
  if(!el)return;
  if(mapInst[id]){updateMapMarkers(id,pois);return}
  var m=L.map(el,{scrollWheelZoom:false}).setView(center,zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'©OSM ©CARTO',maxZoom:18}).addTo(m);
  mapLayers[id]=L.layerGroup().addTo(m);
  mapInst[id]=m;
  updateMapMarkers(id,pois);
  setTimeout(function(){m.invalidateSize()},200);
}

function updateMapMarkers(id,pois){
  var m=mapInst[id],lg=mapLayers[id];
  if(!m||!lg)return;
  lg.clearLayers();
  var filt=mapFilter[id];
  var isKyoto=id==='kyoto';
  pois.forEach(function(p){
    if(filt&&p.days&&p.days.indexOf(filt)===-1)return;
    var c=poiColor(p);
    var gmUrl=isKyoto?gmk(p.n):gm(p.n,p.lat,p.lng);
    var pop='<b>'+p.n+'</b>'+(p.who?' <small>('+p.who+')</small>':'')+'<br><small style="color:'+CC[p.s]+'">'+CL[p.s]+'</small> · <small>'+poiLabel(p)+'</small>';
    if(p.tip)pop+='<br><small style="color:#880e4f">'+p.tip+'</small>';
    if(p.days&&p.days.length)pop+='<br><small>Day: '+p.days.map(function(d){return d.split('-')[2]}).join(', ')+'</small>';
    pop+='<br><a href="'+gmUrl+'" target="_blank" rel="noopener" style="font-size:11px">Google Maps ↗</a>';
    if(p.t==='hotel'){
      var ic=L.divIcon({className:'',html:'<div style="width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid '+c+';filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))"></div>',iconSize:[14,12],iconAnchor:[7,12]});
      lg.addLayer(L.marker([p.lat,p.lng],{icon:ic}).bindPopup(pop));
    }else if(p.t==='sakura'){
      var sic=L.divIcon({className:'',html:'<div style="font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))">🌸</div>',iconSize:[20,20],iconAnchor:[10,10]});
      lg.addLayer(L.marker([p.lat,p.lng],{icon:sic}).bindPopup(pop));
    }else{
      var r=p.t==='pm'?8:p.t==='rest'?7:5;
      var fo=p.t==='night'?.4:.85;
      lg.addLayer(L.circleMarker([p.lat,p.lng],{radius:r,fillColor:c,color:'#fff',weight:2,fillOpacity:fo}).bindPopup(pop));
    }
  });
  m.invalidateSize();
}

function filterMap(id,date){
  mapFilter[id]=mapFilter[id]===date?null:date;
  var pois=id==='tokyo'?TPOI:KPOI;
  updateMapMarkers(id,pois);
  renderMapPanel(id,pois,id==='kyoto');
}

    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:var(--t1)"></div> Restaurant (I)</div>';
    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:var(--t2)"></div> Restaurant (II)</div>';
    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:#d35400"></div> Afternoon</div>';
    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:#999;opacity:.4"></div> Nightlife</div>';
    h+='<div class="mlr"><div style="font-size:12px;line-height:1">🌸</div> Cherry Blossoms</div>';
    h+='</div>';
  }else{
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">';
    h+='<div class="mlr"><div class="tri" style="border-bottom-color:#1a1a2e"></div> Hotel</div>';
    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:var(--ky)"></div> Restaurant</div>';
    h+='<div class="mlr"><div style="width:9px;height:9px;border-radius:50%;background:#999;opacity:.4"></div> Nightlife</div>';
    h+='</div>';
  }

  // filtered POI list
  var visPois=filt?pois.filter(function(p){return !p.days||p.days.indexOf(filt)!==-1}):pois;
  ['hotel','rest','pm','sakura','night'].forEach(function(t){
    var items=visPois.filter(function(p){return p.t===t});
    if(!items.length)return;
    var label=t==='rest'?'Restaurants & Dining':t==='night'?'Nightlife':t==='pm'?'Afternoon Activities':t==='sakura'?'🌸 Cherry Blossom Spots':'Hotels';
    h+='<div class="mlst">'+label+'</div>';
    items.forEach(function(p){
      var dc=poiColor(p);
      var op=t==='night'?'.4':'.85';
      h+='<div class="mlp" style="'+(t==='night'?'color:#999':'')+'">';
      h+='<span class="d" style="border-radius:'+(t==='hotel'?'0':'50%')+';background:'+dc+';opacity:'+op+'"></span>';
      var gmUrl=isKyoto?gmk(p.n):gm(p.n,p.lat,p.lng);
      h+='<a href="'+gmUrl+'" target="_blank" rel="noopener">'+p.n+'</a>'+(p.who?' <small>('+p.who+')</small>':'');
      if(p.days&&p.days.length)h+='<span class="s" style="color:var(--mute)">'+p.days.map(function(d){return d.split('-')[2]}).join(',')+'</span>';
      h+='</div>';
    });
  });
  h+='</div>';

  // We write to the below-* div, not the pane itself
  document.getElementById('below-'+id).innerHTML=h;
}

// ── Init ─────────────────────────────────────────────────
function initApp(){
  if(window._appInit)return;window._appInit=true;
  var tb=document.getElementById('tabs');
  tb.innerHTML='<button class="tab on" id="t-calendar" onclick="switchTab(\'calendar\')">📅 Calendar</button><button class="tab" id="t-tokyo" onclick="switchTab(\'tokyo\')">🗼 Tokyo</button><button class="tab" id="t-kyoto" onclick="switchTab(\'kyoto\')">⛩ Kyoto</button><button class="tab" id="t-travel" onclick="switchTab(\'travel\')">✈️ Travel</button>';
  // Set up map panes with static map div + dynamic content div
  document.getElementById('pane-tokyo').innerHTML='<div class="mapw" id="map-tokyo"></div><div id="below-tokyo"></div>';
  document.getElementById('pane-kyoto').innerHTML='<div class="mapw" id="map-kyoto"></div><div id="below-kyoto"></div>';
  renderCal();
  renderMapPanel('tokyo',TPOI,false);
  renderMapPanel('kyoto',KPOI,true);
}
// Auto-init if already authenticated
if(sessionStorage.getItem('jp26')==='1')initApp();

// ── Live Weather from Open-Meteo (free, no API key, CORS-friendly) ──
function wxIcon(code){
  if(code<=1)return '☀️';
  if(code<=3)return '⛅';
  if(code<=48)return '🌥️';
  if(code<=57)return '🌧️';
  if(code<=67)return '🌦️';
  if(code<=77)return '🌨️';
  if(code<=82)return '🌧️';
  if(code<=86)return '🌨️';
  return '⛈️';
}
function wxDesc(code){
  if(code<=1)return 'Clear skies';
  if(code===2)return 'Partly cloudy';
  if(code===3)return 'Overcast';
  if(code<=48)return 'Foggy';
  if(code<=55)return 'Light drizzle';
  if(code<=57)return 'Freezing drizzle';
  if(code<=63)return 'Rain';
  if(code<=67)return 'Freezing rain';
  if(code<=75)return 'Snow';
  if(code<=77)return 'Snow grains';
  if(code<=82)return 'Rain showers';
  if(code<=86)return 'Snow showers';
  return 'Thunderstorm';
}
function fetchLiveWeather(){
  var locs=[
    {lat:35.6762,lng:139.6503,city:'tokyo'},
    {lat:35.0116,lng:135.7681,city:'kyoto'}
  ];
  var tripDates=DAYS.map(function(d){return d.date});
  var start=tripDates[0],end=tripDates[tripDates.length-1];
  var fetched=0;
  locs.forEach(function(loc){
    var url='https://api.open-meteo.com/v1/forecast?latitude='+loc.lat+'&longitude='+loc.lng
      +'&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode'
      +'&temperature_unit=fahrenheit&timezone=Asia/Tokyo'
      +'&start_date='+start+'&end_date='+end;
    fetch(url).then(function(r){return r.json()}).then(function(data){
      if(!data.daily)return;
      var dates=data.daily.time;
      dates.forEach(function(dt,i){
        DAYS.forEach(function(day){
          var isMatch=day.date===dt;
          var cityMatch=(loc.city==='tokyo'&&(day.city==='tokyo1'||day.city==='tokyo2'))||(loc.city==='kyoto'&&day.city==='kyoto');
          if(isMatch&&cityMatch){
            var code=data.daily.weathercode[i];
            day.wx={
              ic:wxIcon(code),
              hi:Math.round(data.daily.temperature_2m_max[i]),
              lo:Math.round(data.daily.temperature_2m_min[i]),
              rain:Math.round(data.daily.precipitation_sum[i]*10)/10,
              d:wxDesc(code)+(data.daily.precipitation_sum[i]>0?' · Bring umbrella.':''),
              live:true
            };
          }
        });
      });
      fetched++;
      if(fetched===locs.length){
        if(curTab==='calendar')renderCal();
        // Add live badge
        var el=document.querySelector('.wxr');
        if(el&&!document.querySelector('.wx-live-tag')){
          var tag=document.createElement('div');
          tag.className='wx-live-tag';
          tag.style.cssText='font-size:9px;color:#1565c0;text-align:right;margin-top:2px;font-weight:600';
          tag.textContent='⚡ Live forecast from Open-Meteo';
        }
      }
    }).catch(function(e){console.log('Weather fetch failed for '+loc.city+':',e)});
  });
}
// Fetch live weather on load (will silently override static data if API is reachable)
setTimeout(fetchLiveWeather,500);
</script>
